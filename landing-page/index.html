<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiProdu | Catálogo Digital Inteligente y Sistema SaaS para tu Tienda Online</title>

    <!-- Limpieza profunda de cache ante errores de carga de chunks -->
    <script>
      window.forceHardReload = async function() {
        if (typeof window.stop === 'function') window.stop();
        const retryCount = parseInt(sessionStorage.getItem('chunk_retry_count') || '0', 10);
        if (retryCount >= 3) return;
        sessionStorage.setItem('chunk_retry_count', (retryCount + 1).toString());
        
        const performCleanup = async () => {
          try {
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              for (const registration of registrations) await registration.unregister();
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              for (const key of keys) await caches.delete(key);
            }
          } catch (err) {}
        };

        await Promise.race([performCleanup(), new Promise(resolve => setTimeout(resolve, 1000))]);
        const url = new URL(window.location.href);
        url.searchParams.set('reload_fix', Date.now().toString());
        window.location.replace(url.toString());
      }

      window.addEventListener('vite:preloadError', () => window.forceHardReload());
      window.addEventListener('error', (e) => {
        const errorMsg = (e.message || (e.error && e.error.message) || '').toString();
        if (errorMsg.includes('Failed to fetch') || errorMsg.includes('dynamically imported') || errorMsg.includes('MIME type')) {
          window.forceHardReload();
        }
      }, true);
      window.addEventListener('unhandledrejection', (e) => {
        const reason = (e.reason && e.reason.toString()) || '';
        if (reason.includes('Failed to fetch') || reason.includes('dynamically imported')) {
          window.forceHardReload();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
